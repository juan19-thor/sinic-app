version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: sinic_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sinic_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sinic_pass}
      POSTGRES_DB: ${POSTGRES_DB:-sinic_db}
    ports:
      - "5432:5432"
    volumes:
      - sinic_pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sinic_user} -d ${POSTGRES_DB:-sinic_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sinic_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sinic_user}:${POSTGRES_PASSWORD:-sinic_pass}@db:5432/${POSTGRES_DB:-sinic_db}
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000,http://frontend:3000
      DEBUG: "false"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sinic_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  sinic_pgdata:
